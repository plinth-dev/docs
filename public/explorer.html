<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bank-Grade Platform Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A1628;
  --bg-2: #0C1B30;
  --surface: #0F2942;
  --surface-2: #14304F;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.16);
  --line-3: rgba(255,255,255,0.28);
  --text: #EAEFF5;
  --text-2: #94A3B8;
  --text-3: #5B6B7E;
  --accent: #14B8A6;
  --accent-2: #0EA5A0;
  --accent-soft: rgba(20,184,166,0.14);
  --accent-line: rgba(20,184,166,0.45);
  --warn: #FBBF24;
  --audit: #A78BFA;
  --rose: #F87171;
  --green: #34D399;
  --serif: 'Newsreader', Georgia, serif;
  --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
  --pad: clamp(20px, 4vw, 56px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 300;
  line-height: 1.65;
  letter-spacing: -0.005em;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.022) 1px, transparent 0);
  background-size: 28px 28px;
}

/* — Layout shell — */
.shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
@media (max-width: 960px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--line);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.sidebar-mark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  border-left: 2px solid var(--accent);
  padding-left: 10px;
  line-height: 1.4;
}
.sidebar-mark strong {
  display: block;
  color: var(--text);
  font-weight: 500;
  letter-spacing: 0.05em;
  margin-top: 4px;
}
.sidebar nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  margin-top: 8px;
}
.sidebar nav a {
  color: var(--text-2);
  text-decoration: none;
  padding: 6px 0 6px 24px;
  position: relative;
  transition: color 220ms ease, transform 220ms ease;
  border-left: 1px solid transparent;
  margin-left: -2px;
  padding-left: 14px;
}
.sidebar nav a:hover { color: var(--text); }
.sidebar nav a.active {
  color: var(--accent);
  border-left-color: var(--accent);
}
.sidebar nav a .num {
  display: inline-block;
  width: 28px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.sidebar nav a.active .num { color: var(--accent); }
.sidebar-foot {
  margin-top: auto;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-foot button {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-2);
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 200ms ease;
}
.sidebar-foot button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.main {
  padding: 0 var(--pad) 96px;
  max-width: 1080px;
  width: 100%;
}

/* — Section base — */
.section {
  padding: 96px 0 64px;
  border-top: 1px solid var(--line);
}
.section:first-of-type { border-top: none; }
.section-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-num::before {
  content: '';
  display: inline-block;
  width: 32px;
  height: 1px;
  background: var(--text-3);
}
.section-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  text-wrap: balance;
}
.section-sub {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 40px;
}
.section-prose {
  font-size: 17px;
  line-height: 1.7;
  color: var(--text);
  max-width: 640px;
  text-wrap: pretty;
  font-weight: 300;
}
.section-prose + .section-prose { margin-top: 18px; }
.section-prose strong { color: var(--text); font-weight: 500; }
.section-prose em { font-style: italic; color: var(--text-2); }

/* — Hero — */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 64px 0;
  border-top: none;
  position: relative;
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: '';
  flex: 0 0 24px;
  height: 1px;
  background: var(--accent-line);
}
.hero-eyebrow::after { flex: 1 1 auto; max-width: 200px; }
.hero-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(44px, 7vw, 96px);
  line-height: 0.98;
  letter-spacing: -0.025em;
  margin-bottom: 24px;
  text-wrap: balance;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.hero-lede {
  font-size: 19px;
  line-height: 1.6;
  color: var(--text-2);
  max-width: 640px;
  text-wrap: pretty;
  margin-bottom: 56px;
  font-weight: 300;
}
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.hero-meta div {
  flex: 1 1 160px;
  padding: 16px 20px 16px 0;
  border-right: 1px solid var(--line);
  color: var(--text-3);
}
.hero-meta div:last-child { border-right: none; }
.hero-meta span {
  display: block;
  color: var(--text);
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: none;
  margin-top: 6px;
  font-weight: 500;
}
.hero-scroll {
  margin-top: 64px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 14px;
}
.hero-scroll-bar {
  width: 56px;
  height: 1px;
  background: linear-gradient(to right, var(--text-3), transparent);
  position: relative;
  overflow: hidden;
}
.hero-scroll-bar::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 1px;
  background: var(--accent);
  animation: scrollPulse 2.6s ease-in-out infinite;
}
@keyframes scrollPulse {
  0% { transform: translateX(-16px); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateX(56px); opacity: 0; }
}

/* — Zone diagram — */
.zone-canvas {
  margin: 56px 0 32px;
  position: relative;
  border: 1px solid var(--line);
  background: var(--bg-2);
  border-radius: 2px;
  overflow: hidden;
}
.zone-canvas svg { display: block; width: 100%; height: auto; }
.zone-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px 32px;
  margin-top: 24px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-2);
}
.zone-legend span {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.zone-legend i {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 1px;
  font-style: normal;
}

/* — Two-col content blocks — */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  margin-top: 56px;
  align-items: start;
}
@media (max-width: 760px) {
  .two-col { grid-template-columns: 1fr; gap: 32px; }
}
.detail-card {
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 28px 28px 32px;
  font-size: 14px;
  line-height: 1.7;
  position: relative;
}
.detail-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 24px;
  height: 1px;
  background: var(--accent);
}
.detail-card h4 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 18px;
  font-weight: 500;
}
.detail-card dl { display: grid; grid-template-columns: minmax(80px, auto) 1fr; gap: 10px 24px; }
.detail-card dt {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding-top: 4px;
  white-space: nowrap;
}
.detail-card dd { color: var(--text); font-size: 14px; }
.detail-card dd em { color: var(--text-2); font-style: italic; }

/* — Lifecycle simulator — */
.lifecycle {
  margin: 48px 0 32px;
  border: 1px solid var(--line);
  background: var(--bg-2);
}
.lifecycle-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-2);
}
.lifecycle-btn {
  background: transparent;
  border: 1px solid var(--line-2);
  color: var(--text);
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 200ms ease;
}
.lifecycle-btn:hover { border-color: var(--accent); color: var(--accent); }
.lifecycle-btn.playing { color: var(--accent); border-color: var(--accent); }
.lifecycle-step-counter { color: var(--text-3); margin-left: auto; }
.lifecycle-svg-wrap { padding: 28px 16px; }
.lifecycle-caption {
  padding: 18px 24px 22px;
  border-top: 1px solid var(--line);
  font-size: 14px;
  min-height: 88px;
}
.lifecycle-caption .step-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.lifecycle-caption .step-detail { color: var(--text); line-height: 1.55; }
.lifecycle-caption .step-flow {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-2);
  margin-top: 6px;
}

/* — Tech stack picker — */
.stack-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  margin-top: 48px;
  background: var(--line);
  border: 1px solid var(--line);
}
.stack-card {
  background: var(--bg);
  padding: 22px 20px;
  cursor: pointer;
  transition: background 220ms ease;
  border-left: 1px solid transparent;
}
.stack-card:hover { background: var(--bg-2); border-left-color: var(--accent); }
.stack-card .zone-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}
.stack-card .name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.stack-card .role {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 14px;
}
.stack-card .why {
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
}
.stack-card .alts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  letter-spacing: 0.04em;
}
.stack-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 32px;
  font-family: var(--mono);
  font-size: 11px;
}
.stack-filter {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-2);
  padding: 6px 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 200ms ease;
}
.stack-filter:hover { border-color: var(--text-2); color: var(--text); }
.stack-filter.active { border-color: var(--accent); color: var(--accent); }

/* — Roadmap — */
.roadmap {
  margin-top: 48px;
  border: 1px solid var(--line);
  background: var(--bg-2);
  overflow: hidden;
}
.roadmap-grid {
  display: grid;
  grid-template-columns: 80px repeat(28, 1fr);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--line);
}
.roadmap-grid > div {
  padding: 10px 4px;
  text-align: center;
  color: var(--text-3);
  border-right: 1px solid var(--line);
}
.roadmap-grid > div:first-child { color: var(--text-3); text-align: left; padding-left: 16px; }
.roadmap-rows { padding: 8px 0; }
.roadmap-row {
  display: grid;
  grid-template-columns: 80px repeat(28, 1fr);
  align-items: center;
  height: 56px;
  position: relative;
}
.roadmap-row:hover { background: rgba(255,255,255,0.02); }
.roadmap-row .label {
  padding-left: 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-2);
  line-height: 1.3;
}
.roadmap-row .label strong {
  display: block;
  color: var(--text);
  font-weight: 500;
  font-size: 12px;
}
.roadmap-bar {
  position: relative;
  height: 28px;
  margin: 0 4px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid;
  background-image: linear-gradient(to right, var(--accent-soft), transparent 60%);
}
.roadmap-detail {
  margin-top: 0;
  padding: 24px 24px 28px;
  border-top: 1px solid var(--line);
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-2);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px 32px;
}
.roadmap-detail .phase {
  border-left: 2px solid;
  padding-left: 14px;
}
.roadmap-detail .phase h5 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 8px;
  font-weight: 500;
}
.roadmap-detail .phase ul {
  list-style: none;
  font-size: 12px;
  line-height: 1.55;
}
.roadmap-detail .phase li {
  padding-left: 12px;
  position: relative;
  color: var(--text-2);
  margin-bottom: 4px;
}
.roadmap-detail .phase li::before {
  content: '·';
  position: absolute;
  left: 0;
  color: var(--text-3);
}

/* — Audit gap counter (Starter Kit) — */
.gap-counter {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line);
  background: var(--bg-2);
  margin-top: 48px;
  font-family: var(--mono);
}
.gap-counter > div {
  padding: 32px 28px;
  border-right: 1px solid var(--line);
}
.gap-counter > div:last-child { border-right: none; }
.gap-counter .label {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 16px;
}
.gap-counter .num {
  font-family: var(--serif);
  font-size: 72px;
  line-height: 1;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.gap-counter .num.before { color: var(--rose); }
.gap-counter .num.after { color: var(--green); }
.gap-counter .desc {
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--text-2);
  margin-top: 12px;
  line-height: 1.5;
  font-family: var(--sans);
  font-weight: 300;
}

/* — Compliance matrix — */
.matrix {
  margin-top: 48px;
  border: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 12px;
}
.matrix-row {
  display: grid;
  grid-template-columns: 220px 1fr 240px;
  border-bottom: 1px solid var(--line);
  align-items: stretch;
}
.matrix-row:last-child { border-bottom: none; }
.matrix-row.head {
  background: var(--bg-2);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
}
.matrix-row > div {
  padding: 14px 18px;
  border-right: 1px solid var(--line);
  color: var(--text);
}
.matrix-row > div:last-child { border-right: none; color: var(--accent); }
.matrix-row > div:first-child { color: var(--text-2); }

/* — Print — */
@media print {
  body { background: white; color: black; }
  .sidebar, .lifecycle-controls, .stack-filters, .hero-scroll { display: none; }
  .shell { grid-template-columns: 1fr; }
  .main { padding: 0; max-width: none; }
  .section { page-break-inside: avoid; padding: 32px 0; border-color: #ccc; }
  .hero { min-height: auto; }
  * { color: black !important; background: white !important; border-color: #ccc !important; }
  .section-sub, .stack-card .zone-tag { color: #666 !important; }
  .accent-line, .hero-title em, .lifecycle-btn.playing { color: #14B8A6 !important; }
}

/* — Misc — */
::selection { background: var(--accent); color: var(--bg); }
.kbd {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border: 1px solid var(--line-2);
  border-bottom-width: 2px;
  border-radius: 3px;
  color: var(--text-2);
  background: var(--surface);
  vertical-align: middle;
}
hr.thin {
  border: none;
  border-top: 1px solid var(--line);
  margin: 32px 0;
}
.fineprint {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--text-3);
  line-height: 1.6;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.0/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — —
// DATA
// — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — — —

const sections = [
  { id: 'architecture',  num: '01', title: 'Reference architecture',          short: 'Architecture' },
  { id: 'identity',      num: '02', title: 'Identity & trust',                 short: 'Identity' },
  { id: 'workflow',      num: '03', title: 'Durable workflows',                short: 'Workflow' },
  { id: 'observability', num: '04', title: 'Observability & audit',            short: 'Observability' },
  { id: 'devx',          num: '05', title: 'Developer experience',             short: 'Dev experience' },
  { id: 'starter',       num: '06', title: 'The new starter kit',              short: 'Starter kit' },
  { id: 'compliance',    num: '07', title: 'Compliance & operations',          short: 'Compliance' },
  { id: 'roadmap',       num: '08', title: 'Roadmap',                          short: 'Roadmap' },

// Animated zone diagram — pulses traverse edges
function ZoneDiagram() {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const loop = (now) => {
      setTick((now - start) / 1000);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const zoneById = useMemo(() => Object.fromEntries(zones.map(z => [z.id, z])), []);
  const colorMap = {
    rose:  '#F87171',
    teal:  '#14B8A6',
    audit: '#A78BFA',
    amber: '#FBBF24',
    green: '#34D399',
  };

  // Each edge has a pulse offset (its own period)
  const edges = useMemo(() => zoneEdges.map((e, i) => {
    const period = 4.2 + (i % 3) * 0.6;
    const offset = i * 0.7;
    return { ...e, period, offset };
  }), []);

  return (
    <svg viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid meet" style={{maxHeight: 560}}>
      {/* faint blueprint grid */}
      <defs>
        <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
          <circle cx="0.5" cy="0.5" r="0.5" fill="rgba(255,255,255,0.04)" />
        </pattern>
      </defs>
      <rect width="1000" height="560" fill="url(#grid)" />

      {/* edges */}
      {edges.map((e, i) => {
        const a = zoneById[e.from], b = zoneById[e.to];
        const x1 = a.x, y1 = a.y, x2 = b.x, y2 = b.y;
        // build a path
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy);
        // pulse position 0..1
        const t = ((tick + e.offset) % e.period) / e.period;
        const px = x1 + dx * t, py = y1 + dy * t;
        // ease in/out fade for the pulse
        const pulseAlpha = Math.min(1, Math.sin(t * Math.PI) * 1.3);
        return (
          <g key={i}>
            <line x1={x1} y1={y1} x2={x2} y2={y2}
              stroke="rgba(255,255,255,0.13)" strokeWidth="1" strokeDasharray="2 4" />
            <circle cx={px} cy={py} r="3"
              fill={colorMap[a.color]} opacity={pulseAlpha} />
            <circle cx={px} cy={py} r="6"
              fill="none" stroke={colorMap[a.color]} strokeWidth="0.5" opacity={pulseAlpha * 0.4} />
          </g>
        );
      })}

      {/* zone nodes */}
      {zones.map(z => {
        const w = z.w, h = 64;
        const x = z.x - w/2, y = z.y - h/2;
        const c = colorMap[z.color];
        return (
          <g key={z.id}>
            <rect x={x} y={y} width={w} height={h}
              fill="#0F2942" stroke={c} strokeOpacity="0.5" strokeWidth="1" />
            {/* corner ticks */}
            <line x1={x} y1={y} x2={x+8} y2={y} stroke={c} strokeWidth="1.5"/>
            <line x1={x} y1={y} x2={x} y2={y+8} stroke={c} strokeWidth="1.5"/>
            <line x1={x+w} y1={y+h} x2={x+w-8} y2={y+h} stroke={c} strokeWidth="1.5"/>
            <line x1={x+w} y1={y+h} x2={x+w} y2={y+h-8} stroke={c} strokeWidth="1.5"/>
            <text x={z.x} y={z.y - 6} textAnchor="middle"
              fontFamily="IBM Plex Sans" fontSize="14" fontWeight="500" fill="#EAEFF5">
              {z.label}
            </text>
            <text x={z.x} y={z.y + 14} textAnchor="middle"
              fontFamily="IBM Plex Mono" fontSize="10" fill="#94A3B8" letterSpacing="0.04em">
              {z.spec}
            </text>
          </g>
        );
      })}

      {/* annotation tag — top right */}
      <g>
        <text x="980" y="28" textAnchor="end"
          fontFamily="IBM Plex Mono" fontSize="10" fill="#5B6B7E" letterSpacing="0.18em">
          FIG · 01 / SEVEN ZONES
        </text>
      </g>
    </svg>
  );
}

// Lifecycle simulator: animated request-flow demo
function LifecycleSimulator() {
  const [stepIndex, setStepIndex] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0); // 0..1 within current step
  const stepDuration = 1800; // ms
  const rafRef = useRef(null);
  const lastRef = useRef(performance.now());

  useEffect(() => {
    if (!playing) return;
    lastRef.current = performance.now();
    const loop = (now) => {
      const dt = now - lastRef.current;
      lastRef.current = now;
      setProgress(p => {
        const next = p + dt / stepDuration;
        if (next >= 1) {
          setStepIndex(i => (i + 1) % lifecycleSteps.length);
          return 0;
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing]);

  const nodeById = useMemo(() => Object.fromEntries(lifecycleNodes.map(n => [n.id, n])), []);
  const step = lifecycleSteps[stepIndex];
  const fromNode = nodeById[step.from];
  const toNode = nodeById[step.to];
  const px = fromNode.x + (toNode.x - fromNode.x) * progress;
  const py = fromNode.y + (toNode.y - fromNode.y) * progress;

  return (
    <div className="lifecycle">
      <div className="lifecycle-controls">
        <button
          className={'lifecycle-btn' + (playing ? ' playing' : '')}
          onClick={() => setPlaying(p => !p)}>
          {playing ? '■ Pause' : '▶ Play'}
        </button>
        <button
          className="lifecycle-btn"
          onClick={() => { setStepIndex(0); setProgress(0); }}>
          ↻ Reset
        </button>
        <button
          className="lifecycle-btn"
          onClick={() => { setStepIndex(i => (i+1) % lifecycleSteps.length); setProgress(0); }}>
          Step ▸
        </button>
        <span className="lifecycle-step-counter">
          Step {String(stepIndex+1).padStart(2,'0')} / {String(lifecycleSteps.length).padStart(2,'0')}
        </span>
      </div>
      <div className="lifecycle-svg-wrap">
        <svg viewBox="0 0 1000 320" preserveAspectRatio="xMidYMid meet" style={{width: '100%', height: 320}}>
          {/* connecting hint lines */}
          {lifecycleSteps.map((s, i) => {
            const a = nodeById[s.from], b = nodeById[s.to];
            const isCurrent = i === stepIndex;
            return (
              <line key={i}
                x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={isCurrent ? 'rgba(20,184,166,0.8)' : 'rgba(255,255,255,0.06)'}
                strokeWidth={isCurrent ? 1.2 : 0.8}
                strokeDasharray={isCurrent ? '0' : '2 3'} />
            );
          })}
          {/* nodes */}
          {lifecycleNodes.map(n => {
            const isFrom = n.id === step.from;
            const isTo = n.id === step.to;
            const active = isFrom || isTo;
            return (
              <g key={n.id}>
                <circle cx={n.x} cy={n.y} r={active ? 7 : 4}
                  fill={active ? '#14B8A6' : '#0F2942'}
                  stroke={active ? '#14B8A6' : 'rgba(255,255,255,0.3)'}
                  strokeWidth="1" />
                <text x={n.x} y={n.y - 14}
                  textAnchor="middle"
                  fontFamily="IBM Plex Mono" fontSize="10"
                  fill={active ? '#14B8A6' : '#94A3B8'}
                  letterSpacing="0.06em">
                  {n.label}
                </text>
              </g>
            );
          })}
          {/* moving packet */}
          <g>
            <circle cx={px} cy={py} r="5" fill="#14B8A6" />
            <circle cx={px} cy={py} r="10" fill="none" stroke="#14B8A6" strokeWidth="0.6" opacity="0.5" />
          </g>
          {/* annotation */}
          <text x="990" y="20" textAnchor="end"
            fontFamily="IBM Plex Mono" fontSize="10" fill="#5B6B7E" letterSpacing="0.18em">
            FIG · 02 / REQUEST LIFECYCLE
          </text>
        </svg>
      </div>
      <div className="lifecycle-caption">
        <div className="step-label">{step.label}</div>
        <div className="step-detail">{step.detail}</div>
        <div className="step-flow">{step.from} → {step.to}</div>

    </div>

}

function App() {
  const [activeId, setActiveId] = useState('hero');

  // Active section via IntersectionObserver
  useEffect(() => {
    const ids = ['hero', ...sections.map(s => s.id)];
    const els = ids.map(id => document.getElementById(id)).filter(Boolean);
    const io = new IntersectionObserver((entries) => {
      // pick the entry closest to the top of viewport that is intersecting
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible[0]) setActiveId(visible[0].target.id);
    }, { rootMargin: '-30% 0px -55% 0px', threshold: 0 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  // Keyboard navigation
  useEffect(() => {
    const ids = ['hero', ...sections.map(s => s.id)];
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const idx = ids.indexOf(activeId);
      if (e.key === 'j' || e.key === 'ArrowDown') {
        e.preventDefault();
        const next = ids[Math.min(idx + 1, ids.length - 1)];
        document.getElementById(next)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else if (e.key === 'k' || e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = ids[Math.max(idx - 1, 0)];
        document.getElementById(prev)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeId]);

  const handlePrint = useCallback(() => window.print(), []);

  return (
    <div className="shell">
      <Sidebar activeId={activeId} onPrint={handlePrint} />
      <main className="main">
        <Hero />
        <ArchitectureSection />
        <IdentitySection />
        <WorkflowSection />
        <ObservabilitySection />
        <DevXSection />
        <StarterSection />
        <ComplianceSection />
        <RoadmapSection />
        <div className="fineprint" style={{marginTop: 96, paddingTop: 32, borderTop: '1px solid var(--line)'}}>
          End of explorer. The full architecture document is <code style={{color:'var(--accent)'}}>platform-architecture.md</code> in this folder.
          Index: <code style={{color:'var(--accent)'}}>README.md</code>.
          <br/><br/>
          Use <span className="kbd">J</span> / <span className="kbd">K</span> or <span className="kbd">↑</span> / <span className="kbd">↓</span> to navigate sections.
          Use the print button (or browser <span className="kbd">⌘P</span>) for a clean PDF.
          <br/><br/>
          Designed as a single self-contained HTML file. No build step. No external state.
          Open with any modern browser; share by sending the file.
        </div>
      </main>
    </div>
  );
}

// Mark window as ready (used by any external screenshot tooling)
window.__ready = true;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
